# ==============================================================================
# 12S-EDNA-DADA2-TAPIRS-WORKFLOW — MASTER CONFIGURATION
# ==============================================================================
# Point input_dir at a flat folder containing paired-end *_R1_001.fastq.gz files.
# The library name is derived automatically from the folder basename.
# All other paths can be absolute or relative to the workflow root.
# ==============================================================================

# Path to flat folder of paired R1/R2 fastq.gz files
# Staged copy of .../V0347/12S/15_no_primers: symlinks to all original files,
# except 11240_HC_323_S6_S147_R2 and 11240_HC_621_S12_S157_R2, which had valid
# gzip data followed by junk zero-byte padding (fastp/FastQC rejected them);
# those two are replaced here with cleanly re-gzipped copies of the same reads.
input_dir: "/prj/DECODE/oysters/12S-edna-dada2-tapirs-workflow/staged_input/15_no_primers"

# Set to "yes" when input_dir already had primers stripped upstream (e.g. this
# "15_no_primers" folder). Skips DADA2's own cutadapt primer trim (files are
# copied through unchanged) and the Tapirs fastp front-trim below is zeroed out
# to avoid cutting into real sequence a second time.
primers_already_removed: "yes"

# Experiment label used in Tapirs output filenames (no spaces)
my_experiment: "12s_oysters"

# Auto-generated by the workflow; do not edit manually
samples: "config/samples.tsv"

# Tapirs taxonomy method: "blast", "kraken2", or "both"
# This setting applies to the Tapirs pipeline only.
# The DADA2/SINTAX pipeline always runs all three reference databases (INBO, MIDORI2, CLARE).
analysis_method: "both"

# -----------------------------------------------
# DATABASE PATHS
# -----------------------------------------------

# Tapirs BLAST database (blastn -db)
blast_db: "/prj/DECODE/Tapirs/resources/databases/12s_fish_blast_db/12s_fish"

# Tapirs Kraken2 database directory
kraken2_db: "/prj/DECODE/Tapirs/resources/databases/12s_fish_kraken2_db"

# NCBI taxdump directory (nodes.dmp, names.dmp, merged.dmp)
taxdump: "/prj/DECODE/Tapirs/resources/databases/new_taxdump"

# Reference FASTA for chimera detection when chimera_detection: "ref"
dechim_blast_db: "/prj/DECODE/Tapirs/resources/databases/12s_fish_blast_db/12s_fish.fasta"

# Directory containing the three SINTAX FASTA files for DADA2
dada2_ref_db: "/prj/DECODE/12S_pipeline/edna-12s-pipeline/reference_db"

# -----------------------------------------------
# TAPIRS — TAXONOMY REPORTING
# -----------------------------------------------
lowest_taxonomic_rank: 'species'
highest_taxonomic_rank: 'order'

# -----------------------------------------------
# TAPIRS — FASTP PARAMETERS
# -----------------------------------------------
FASTP_max_len1: 106
FASTP_max_len2: 106
FASTP_trim_front1: 0   # primers already removed upstream; no extra front-trim needed
FASTP_trim_front2: 0
FASTP_qual_phred: 30
Fastp_unqualified_percent_limit: 40
FASTP_window_size: 5
FASTP_len_required: 60
FASTP_poly_g_min: 10
FASTP_poly_x_min: 10
FASTP_min_overlap: 20
FASTP_diff_percent_limit: 5
FASTP_diff_limit: 5
FASTP_length_limit: 110

# -----------------------------------------------
# TAPIRS — VSEARCH PARAMETERS
# -----------------------------------------------
cluster_method: "denoise"       # "denoise" or "cluster"
chimera_detection: "denovo"     # "denovo" or "ref"

VSEARCH_minuniqsize: 3
VSEARCH_minsize: 1
VSEARCH_unoise_alpha: 2.0
VSEARCH_unoise_id: 0.99
VSEARCH_cluster_id: 1
VSEARCH_query_cov: 1
VSEARCH_mindiffs: 1
VSEARCH_mindiv: 0.8
VSEARCH_abskew: 16.0

# -----------------------------------------------
# TAPIRS — BLAST PARAMETERS
# -----------------------------------------------
BLAST_max_target_seqs: 50
BLAST_min_perc_ident: 75
BLAST_min_evalue: 1e-20
BLAST_threads: 8

# -----------------------------------------------
# TAPIRS — MLCA PARAMETERS
# -----------------------------------------------
MLCA_bitscore: 2
MLCA_identity: 98
MCLA_coverage: 90
MLCA_majority: 80
MLCA_hits: 1

# -----------------------------------------------
# TAPIRS — KRAKEN2 PARAMETERS
# -----------------------------------------------
kraken2_confidence: 0.0
kraken2_threads: 8

# -----------------------------------------------
# DADA2 PARAMETERS
# -----------------------------------------------
# Set to "yes" if a Fusion tag was used in library prep.
# This changes the first base of the forward primer from A to G (ACTGG... -> GCTGG...)
# to match the sequence as it appears in the reads (only applies when trim_left: 0).
fusion_tag: "yes"

# Number of bases to trim from the 5' end of each read (= primer length).
# Set to 0 to use cutadapt primer detection instead of fixed trimming.
# Ignored while primers_already_removed: "yes" above.
trim_left: 18   # set this to 0 if cutadapt is to be used

sintax_cutoff: 0.7
# Path to usearch binary. Run `bash bin/install_usearch.sh` to download it.
usearch_bin: "bin/usearch"
# Names must match db_name entries in workflow/scripts/dada2/00_config.R
sintax_databases:
  - INBO
  - MIDORI
  - CLARE
# Threads per SINTAX job; lower than dada2_threads to allow parallel db runs
sintax_threads: 24
dada2_threads: 64
dada2_maxEE_F: 2
dada2_maxEE_R: 2
