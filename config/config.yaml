# ==============================================================================
# 12S-EDNA-DADA2-TAPIRS-WORKFLOW — MASTER CONFIGURATION
# ==============================================================================
# Point input_dir at a flat folder containing paired-end *_R1_001.fastq.gz files.
# The library name is derived automatically from the folder basename.
# All other paths can be absolute or relative to the workflow root.
# ==============================================================================

# Path to flat folder of paired R1/R2 fastq.gz files
input_dir: "/hdd0/laucoo/arctic_charr/Sequencing_data/LDCHARM_Spring/fastq"

# Experiment label used in Tapirs output filenames (no spaces)
my_experiment: "12s_edna"

# Auto-generated by the workflow; do not edit manually
samples: "config/samples.tsv"

# Tapirs taxonomy method: "blast", "kraken2", or "both"
# This setting applies to the Tapirs pipeline only.
# The DADA2/SINTAX pipeline always runs all three reference databases (INBO, MIDORI2, CLARE).
analysis_method: "both"

# -----------------------------------------------
# DATABASE PATHS
# -----------------------------------------------

# Tapirs BLAST database (blastn -db)
blast_db: "/prj/DECODE/Tapirs/resources/databases/12s_fish_blast_db/12s_fish"

# Tapirs Kraken2 database directory
kraken2_db: "/prj/DECODE/Tapirs/resources/databases/12s_fish_kraken2_db"

# NCBI taxdump directory (nodes.dmp, names.dmp, merged.dmp)
taxdump: "/prj/DECODE/Tapirs/resources/databases/new_taxdump"

# Reference FASTA for chimera detection when chimera_detection: "ref"
dechim_blast_db: "/prj/DECODE/Tapirs/resources/databases/12s_fish_blast_db/12s_fish.fasta"

# Directory containing the three SINTAX FASTA files for DADA2
dada2_ref_db: "/prj/DECODE/12S_pipeline/edna-12s-pipeline/reference_db"

# -----------------------------------------------
# TAPIRS — TAXONOMY REPORTING
# -----------------------------------------------
lowest_taxonomic_rank: 'species'
highest_taxonomic_rank: 'order'

# -----------------------------------------------
# TAPIRS — FASTP PARAMETERS
# -----------------------------------------------
FASTP_max_len1: 106
FASTP_max_len2: 106
FASTP_trim_front1: 20
FASTP_trim_front2: 20
FASTP_qual_phred: 30
Fastp_unqualified_percent_limit: 40
FASTP_window_size: 5
FASTP_len_required: 60
FASTP_poly_g_min: 10
FASTP_poly_x_min: 10
FASTP_min_overlap: 20
FASTP_diff_percent_limit: 5
FASTP_diff_limit: 5
FASTP_length_limit: 110

# -----------------------------------------------
# TAPIRS — VSEARCH PARAMETERS
# -----------------------------------------------
cluster_method: "denoise"       # "denoise" or "cluster"
chimera_detection: "denovo"     # "denovo" or "ref"

VSEARCH_minuniqsize: 3
VSEARCH_minsize: 1
VSEARCH_unoise_alpha: 2.0
VSEARCH_unoise_id: 0.99
VSEARCH_cluster_id: 1
VSEARCH_query_cov: 1
VSEARCH_mindiffs: 1
VSEARCH_mindiv: 0.8
VSEARCH_abskew: 16.0

# -----------------------------------------------
# TAPIRS — BLAST PARAMETERS
# -----------------------------------------------
BLAST_max_target_seqs: 50
BLAST_min_perc_ident: 75
BLAST_min_evalue: 1e-20
BLAST_threads: 8

# -----------------------------------------------
# TAPIRS — MLCA PARAMETERS
# -----------------------------------------------
MLCA_bitscore: 2
MLCA_identity: 98
MCLA_coverage: 90
MLCA_majority: 80
MLCA_hits: 1

# -----------------------------------------------
# TAPIRS — KRAKEN2 PARAMETERS
# -----------------------------------------------
kraken2_confidence: 0.0
kraken2_threads: 8

# -----------------------------------------------
# DADA2 PARAMETERS
# -----------------------------------------------
sintax_cutoff: 0.7
dada2_threads: 48
dada2_maxEE_F: 2
dada2_maxEE_R: 5
